name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Verify the package builds cleanly ────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check dist with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Verify the package installs and imports correctly ────────────────────
  install-test:
    name: Install & smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Smoke test — import and version check
        run: |
          python - <<'EOF'
          import chartcraft as cc
          print(f"◆ ChartCraft {cc.__version__} — OK")

          # Core data classes
          assert hasattr(cc, "Data")
          assert hasattr(cc, "Series")
          assert hasattr(cc, "DataFrame")
          assert hasattr(cc, "Dashboard")
          print("  Core classes — OK")

          # Chart functions (all 19)
          chart_funcs = [
              "bar", "line", "area", "pie", "donut",
              "scatter", "bubble", "histogram", "boxplot",
              "heatmap", "radar", "waterfall", "gauge",
              "candlestick", "table", "metric", "sankey",
              "treemap", "funnel",
          ]
          for fn in chart_funcs:
              assert hasattr(cc, fn), f"Missing: cc.{fn}()"
          print(f"  Chart functions ({len(chart_funcs)}) — OK")

          # Data construction + chart render round-trip
          data = cc.Data({
              "month": ["Jan", "Feb"],
              "value": [100, 200],
          })
          chart = cc.bar(data, x="month", y="value", title="CI Test")
          dashboard = cc.Dashboard(
              title="CI Smoke Test",
              charts=[chart],
          )
          html = cc.render(dashboard)
          assert "ChartCraft" in html
          assert "echarts" in html.lower()
          print("  Data → chart → render cycle — OK")

          # Theme functions
          cc.apply_dark_theme()
          cc.apply_light_theme()
          cc.apply_vibrant_theme()
          css = cc.export_theme()
          assert len(css) > 0
          cc.reset_theme()
          assert hasattr(cc, "theme")
          assert hasattr(cc, "get_theme")
          print("  Theme functions — OK")

          # Save to HTML (standalone export)
          cc.save(dashboard, "/tmp/cc-smoke-test.html")
          with open("/tmp/cc-smoke-test.html") as f:
              saved = f.read()
          assert "ChartCraft" in saved
          print("  Save HTML — OK")

          # Visual builder helpers
          assert hasattr(cc, "set_title")
          assert hasattr(cc, "add_bar")
          assert hasattr(cc, "add_line")
          assert hasattr(cc, "add_pie")
          assert hasattr(cc, "add_scatter")
          assert hasattr(cc, "set_layout")
          assert hasattr(cc, "build_dashboard")
          print("  Visual builder helpers — OK")

          print("✅ All checks passed.")
          EOF

  # ── 3. Lint — basic syntax validation ───────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (errors only — no style enforcement)
        run: ruff check chartcraft/ --select E9,F63,F7,F82 --output-format github
