name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Verify the package builds cleanly ────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check dist with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Verify the package installs and imports correctly ────────────────────
  install-test:
    name: Install & smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Smoke test — import and version check
        run: |
          python - <<'EOF'
          import chartcraft as cc
          print(f"◆ ChartCraft {cc.__version__} — OK")

          # Core classes
          assert hasattr(cc, "App")
          assert hasattr(cc, "Dashboard")
          assert hasattr(cc, "Bar")
          assert hasattr(cc, "Line")
          assert hasattr(cc, "Donut")
          assert hasattr(cc, "KPI")
          assert hasattr(cc, "Filter")

          # Themes
          themes = cc.list_themes()
          assert "midnight" in themes
          assert "frost" in themes
          print(f"  Themes: {len(themes)} loaded")

          # Palettes
          palettes = cc.list_palettes()
          assert len(palettes) == 16
          print(f"  Palettes: {len(palettes)} loaded")

          # Connectors
          assert hasattr(cc, "connect_sql")
          assert hasattr(cc, "connect_csv")
          assert hasattr(cc, "connect_api")

          # Quick dashboard — full render cycle
          html = cc.quick_dashboard(
              title="CI Test",
              charts=[cc.Bar({"A": 1, "B": 2}, title="Test Chart")],
              theme="midnight",
          )
          assert "ChartCraft" in html
          assert "ECharts" in html or "echarts" in html
          print("  quick_dashboard render — OK")

          print("✅ All checks passed.")
          EOF

  # ── 3. Lint — basic syntax validation ───────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (errors only — no style enforcement)
        run: ruff check chartcraft/ --select E9,F63,F7,F82 --output-format github
