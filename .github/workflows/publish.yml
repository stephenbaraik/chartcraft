name: Publish to PyPI

# Triggers on any tag that looks like  v1.2.3  or  v1.2.3-beta.1
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  # ── 1. Build the distribution ───────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Publish to PyPI (Trusted Publisher — no API token needed) ────────────
  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: release

    permissions:
      id-token: write   # Required for OIDC Trusted Publisher

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 3. Attach built files to the GitHub Release ─────────────────────────────
  github-release:
    name: Attach artifacts to GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi

    permissions:
      contents: write   # Required to upload release assets

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload wheel and sdist to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
