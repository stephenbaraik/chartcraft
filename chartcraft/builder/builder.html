<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Builder</title>
<!-- ECharts must load before app script -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<!-- ChartCraft Color Picker component -->
<script src="/builder/components/color_picker.js"></script>
<style>
{{THEME_CSS}}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--cc-font-body);
  background: var(--cc-bg);
  color: var(--cc-text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ── Toolbar ── */
#toolbar {
  height: 48px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  background: var(--cc-bg-card);
  border-bottom: 1px solid var(--cc-border);
  flex-shrink: 0;
  overflow-x: auto;
}
#toolbar::-webkit-scrollbar { display: none; }
.cc-brand { font-weight: 700; font-size: 0.95rem; color: var(--cc-accent); margin-right: 4px; flex-shrink: 0; }
.tb-btn {
  padding: 4px 10px;
  border-radius: var(--cc-radius-sm);
  border: 1px solid var(--cc-border);
  background: var(--cc-bg-elevated);
  color: var(--cc-text);
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: border-color 0.12s, background 0.12s;
}
.tb-btn:hover:not(:disabled) { border-color: var(--cc-accent); color: var(--cc-accent); }
.tb-btn.active { background: var(--cc-accent); border-color: var(--cc-accent); color: #fff; }
.tb-btn.primary { background: var(--cc-accent); border-color: var(--cc-accent); color: #fff; }
.tb-btn:disabled { opacity: 0.35; cursor: default; }
.tb-sep { width: 1px; height: 22px; background: var(--cc-border); margin: 0 2px; flex-shrink: 0; }
.tb-label { font-size: 0.72rem; color: var(--cc-text-muted); white-space: nowrap; flex-shrink: 0; }
.tb-spacer { flex: 1; }

/* Alignment tool group — only visible when 2+ widgets selected */
#align-tools { display: none; align-items: center; gap: 4px; }
#align-tools.visible { display: flex; }
.align-btn {
  width: 28px; height: 28px;
  border-radius: 4px;
  border: 1px solid var(--cc-border);
  background: var(--cc-bg-elevated);
  color: var(--cc-text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.align-btn:hover { background: var(--cc-accent); color: #fff; border-color: var(--cc-accent); }
.align-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  top: 52px;
  background: var(--cc-bg-elevated);
  border: 1px solid var(--cc-border);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 0.72rem;
  white-space: nowrap;
  z-index: 500;
  pointer-events: none;
}

/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Widget Library ── */
#widget-lib {
  width: 226px;
  flex-shrink: 0;
  background: var(--cc-bg-card);
  border-right: 1px solid var(--cc-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#lib-search-wrap {
  padding: 10px 8px 8px;
  border-bottom: 1px solid var(--cc-border);
}
#lib-search {
  width: 100%;
  padding: 6px 10px;
  border-radius: var(--cc-radius-sm);
  border: 1px solid var(--cc-border);
  background: var(--cc-bg-elevated);
  color: var(--cc-text);
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.15s;
}
#lib-search:focus { border-color: var(--cc-accent); }
#lib-sections { flex: 1; overflow-y: auto; padding: 6px 4px; }
.wl-section { margin-bottom: 2px; }
.wl-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 8px;
  cursor: pointer;
  border-radius: var(--cc-radius-sm);
  transition: background 0.1s;
}
.wl-section-header:hover { background: var(--cc-bg-elevated); }
.wl-section-title {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--cc-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.wl-section-arrow { font-size: 0.65rem; color: var(--cc-text-muted); transition: transform 0.15s; }
.wl-section.collapsed .wl-section-arrow { transform: rotate(-90deg); }
.wl-items { overflow: hidden; }
.wl-section.collapsed .wl-items { display: none; }
.wl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--cc-radius-sm);
  cursor: grab;
  font-size: 0.82rem;
  color: var(--cc-text-secondary);
  transition: background 0.1s, color 0.1s;
  user-select: none;
}
.wl-item:hover { background: var(--cc-bg-elevated); color: var(--cc-text); }
.wl-item:active { cursor: grabbing; }
.wl-item.hidden { display: none; }
.wl-icon { font-size: 0.95rem; width: 18px; text-align: center; flex-shrink: 0; }

/* ── Center column ── */
#center-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Canvas area ── */
#canvas-outer {
  flex: 1;
  overflow: auto;
  background: var(--cc-bg);
  display: flex;
  justify-content: flex-start;
  align-items: flex-start;
  padding: 24px;
  position: relative;
}
/* Preview mode containers */
#canvas-outer.mode-tablet  { background: #111; }
#canvas-outer.mode-mobile  { background: #111; }
#canvas-frame {
  position: relative;
  flex-shrink: 0;
  width: 100%;
  min-height: 760px;
  transition: width 0.3s, max-width 0.3s;
}
#canvas-outer.mode-tablet  #canvas-frame { max-width: 768px; border: 8px solid #222; border-radius: 12px; overflow: hidden; }
#canvas-outer.mode-mobile  #canvas-frame { max-width: 375px; border: 10px solid #222; border-radius: 18px; overflow: hidden; }
#canvas {
  width: 100%;
  min-height: 760px;
  background: var(--cc-bg);
  position: relative;
  overflow: hidden;
}
/* Snap guides overlay */
#snap-guides {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 50;
}
/* Marquee rect */
#marquee {
  position: absolute;
  border: 1.5px solid var(--cc-accent);
  background: rgba(99,102,241,0.07);
  pointer-events: none;
  z-index: 49;
  display: none;
}
/* Grid dots overlay */
#grid-dots {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  background-image: radial-gradient(circle, var(--cc-border) 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0;
  transition: opacity 0.2s;
}
#grid-dots.visible { opacity: 1; }

/* ── Widget card ── */
.cc-widget {
  position: absolute;
  border: 2px solid transparent;
  border-radius: var(--cc-radius);
  background: var(--cc-bg-card);
  cursor: move;
  overflow: visible;
  min-width: 100px;
  min-height: 60px;
  z-index: 1;
  transition: box-shadow 0.15s;
}
.cc-widget:hover { border-color: rgba(99,102,241,0.5); }
.cc-widget.selected {
  border-color: var(--cc-accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
  z-index: 10;
}
.cc-widget.multi-selected {
  border-color: var(--cc-accent-secondary);
  box-shadow: 0 0 0 2px rgba(139,92,246,0.2);
  z-index: 9;
}
.cc-widget-inner { overflow: hidden; border-radius: calc(var(--cc-radius) - 2px); height: 100%; }
.cc-widget-header {
  padding: 7px 10px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--cc-text-muted);
  border-bottom: 1px solid var(--cc-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  height: 34px;
  background: var(--cc-bg-card);
}
.cc-widget-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--cc-text); font-size: 0.8rem; }
.cc-widget-type { font-size: 0.65rem; color: var(--cc-accent); background: rgba(99,102,241,0.12); padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
.cc-widget-del {
  width: 18px; height: 18px;
  border-radius: 3px; border: none;
  background: transparent; color: var(--cc-text-muted);
  font-size: 0.75rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s, background 0.15s;
}
.cc-widget:hover .cc-widget-del,
.cc-widget.selected .cc-widget-del { opacity: 1; }
.cc-widget-del:hover { background: rgba(239,68,68,0.15); color: var(--cc-danger); }
.cc-widget-body {
  padding: 8px;
  height: calc(100% - 34px);
  background: var(--cc-bg-card);
  overflow: hidden;
}
/* Selection count badge (multi-select leader) */
.cc-select-badge {
  position: absolute;
  top: -10px; right: -10px;
  background: var(--cc-accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  pointer-events: none;
  z-index: 20;
  display: none;
}

/* ── Resize handles ── */
.rh {
  position: absolute;
  background: var(--cc-accent);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 20;
}
.cc-widget.selected .rh,
.cc-widget.multi-selected .rh { opacity: 1; }
.rh.se { bottom: -4px; right: -4px; width: 10px; height: 10px; cursor: se-resize; border-radius: 50%; }
.rh.sw { bottom: -4px; left:  -4px; width: 10px; height: 10px; cursor: sw-resize; border-radius: 50%; }
.rh.ne { top:    -4px; right: -4px; width: 10px; height: 10px; cursor: ne-resize; border-radius: 50%; }
.rh.nw { top:    -4px; left:  -4px; width: 10px; height: 10px; cursor: nw-resize; border-radius: 50%; }
.rh.n  { top: -3px; left: 50%; transform: translateX(-50%); width: 28px; height: 6px; cursor: n-resize; }
.rh.s  { bottom: -3px; left: 50%; transform: translateX(-50%); width: 28px; height: 6px; cursor: s-resize; }
.rh.e  { right: -3px; top: 50%; transform: translateY(-50%); width: 6px; height: 28px; cursor: e-resize; }
.rh.w  { left:  -3px; top: 50%; transform: translateY(-50%); width: 6px; height: 28px; cursor: w-resize; }

/* ── Properties Panel ── */
#props-panel {
  width: 296px;
  flex-shrink: 0;
  background: var(--cc-bg-card);
  border-left: 1px solid var(--cc-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.pp-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--cc-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pp-header-title { font-size: 0.83rem; font-weight: 600; color: var(--cc-text); }
.pp-header-type { font-size: 0.7rem; color: var(--cc-accent); }
.pp-tabs {
  display: flex;
  border-bottom: 1px solid var(--cc-border);
  flex-shrink: 0;
}
.pp-tab {
  flex: 1;
  padding: 7px 2px;
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--cc-text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.12s, border-color 0.12s;
}
.pp-tab:hover { color: var(--cc-text); }
.pp-tab.active { color: var(--cc-accent); border-bottom-color: var(--cc-accent); }
.pp-body { flex: 1; overflow-y: auto; padding: 12px; }
.pp-empty { color: var(--cc-text-muted); font-size: 0.82rem; text-align: center; padding: 48px 20px; line-height: 1.6; }
.pp-field { margin-bottom: 13px; }
.pp-field label { display: block; font-size: 0.72rem; color: var(--cc-text-muted); margin-bottom: 4px; font-weight: 500; }
.pp-field input[type="text"],
.pp-field input[type="number"],
.pp-field input[type="url"],
.pp-field select,
.pp-field textarea {
  width: 100%; padding: 6px 8px;
  border-radius: var(--cc-radius-sm);
  border: 1px solid var(--cc-border);
  background: var(--cc-bg-elevated);
  color: var(--cc-text); font-size: 0.82rem;
  outline: none; transition: border-color 0.15s;
}
.pp-field input:focus,
.pp-field select:focus,
.pp-field textarea:focus { border-color: var(--cc-accent); }
.pp-field textarea { resize: vertical; min-height: 72px; font-family: var(--cc-font-mono); font-size: 0.76rem; }
.pp-row { display: flex; gap: 8px; }
.pp-row .pp-field { flex: 1; }
.pp-section-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--cc-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin: 16px 0 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--cc-border);
}
.pp-colors-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.pp-color-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--cc-bg-elevated);
  border: 1px solid var(--cc-border);
  border-radius: 6px;
  padding: 3px 4px 3px 0;
}
.pp-color-swatch {
  width: 24px; height: 24px; border-radius: 4px;
  cursor: pointer; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
}
.pp-color-remove {
  background: none; border: none; color: var(--cc-text-muted);
  cursor: pointer; font-size: 0.75rem; padding: 0 2px; line-height: 1;
}
.pp-color-remove:hover { color: var(--cc-danger); }
.pp-add-color {
  padding: 4px 8px;
  border-radius: var(--cc-radius-sm);
  border: 1px dashed var(--cc-border);
  background: transparent;
  color: var(--cc-text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.pp-add-color:hover { border-color: var(--cc-accent); color: var(--cc-accent); }
.pp-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--cc-grid);
  margin-bottom: 4px;
}
.pp-toggle-label { font-size: 0.8rem; color: var(--cc-text-secondary); }
.pp-toggle {
  width: 34px; height: 18px;
  border-radius: 9px;
  background: var(--cc-border);
  border: none; cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.pp-toggle.on { background: var(--cc-accent); }
.pp-toggle::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}
.pp-toggle.on::after { transform: translateX(16px); }
.pp-delete-btn {
  width: 100%;
  padding: 8px;
  border-radius: var(--cc-radius-sm);
  border: 1px solid rgba(239,68,68,0.3);
  background: rgba(239,68,68,0.06);
  color: var(--cc-danger);
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.pp-delete-btn:hover { background: rgba(239,68,68,0.14); }

/* ── Code Preview ── */
#code-preview {
  height: 190px;
  border-top: 1px solid var(--cc-border);
  background: var(--cc-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: height 0.2s;
}
#code-preview.collapsed { height: 34px; }
.cp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 12px;
  border-bottom: 1px solid var(--cc-border);
  font-size: 0.73rem; color: var(--cc-text-muted);
  flex-shrink: 0; height: 34px;
}
.cp-actions { display: flex; gap: 5px; }
.cp-btn {
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--cc-border);
  background: transparent; color: var(--cc-text-muted);
  font-size: 0.72rem; cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.cp-btn:hover { border-color: var(--cc-accent); color: var(--cc-accent); }
#code-output {
  flex: 1; overflow: auto; padding: 10px 14px;
  font-family: var(--cc-font-mono); font-size: 0.76rem;
  color: var(--cc-text-secondary); white-space: pre; margin: 0;
  line-height: 1.5;
  background: transparent; border: none; outline: none; resize: none;
  width: 100%; box-sizing: border-box;
}
#code-output.dirty { color: var(--cc-text); }
#code-output.dirty::after { content: ""; }
.cp-btn.parse-btn { background: var(--cc-accent); color: #fff; border-color: var(--cc-accent); font-weight: 600; }
.cp-btn.parse-btn:hover { opacity: 0.85; }
.cp-dirty-badge {
  font-size: 0.68rem; padding: 1px 6px; border-radius: 10px;
  background: var(--cc-accent); color: #fff; margin-left: 4px;
  display: none;
}
.cp-dirty-badge.visible { display: inline; }

/* ── Export / Save dropdown ── */
.tb-dropdown { position: relative; flex-shrink: 0; }
.tb-dropdown-menu {
  position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--cc-bg-card); border: 1px solid var(--cc-border);
  border-radius: var(--cc-radius); min-width: 160px;
  box-shadow: 0 8px 24px var(--cc-shadow);
  z-index: 800; display: none; padding: 4px;
}
.tb-dropdown.open .tb-dropdown-menu { display: block; }
.tb-dropdown-item {
  display: block; width: 100%; text-align: left;
  padding: 7px 12px; border: none; background: transparent;
  color: var(--cc-text); font-size: 0.82rem; cursor: pointer;
  border-radius: var(--cc-radius-sm); transition: background 0.1s;
  white-space: nowrap;
}
.tb-dropdown-item:hover { background: var(--cc-bg-elevated); color: var(--cc-accent); }
.tb-dropdown-sep { height: 1px; background: var(--cc-border); margin: 3px 0; }

/* ── Projects Drawer ── */
#projects-drawer {
  position: fixed; top: 0; right: -340px; width: 320px; height: 100vh;
  background: var(--cc-bg-card); border-left: 1px solid var(--cc-border);
  box-shadow: -8px 0 32px var(--cc-shadow);
  z-index: 850; transition: right 0.25s ease;
  display: flex; flex-direction: column;
}
#projects-drawer.open { right: 0; }
.pd-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--cc-border); flex-shrink: 0;
}
.pd-title { font-weight: 600; font-size: 0.9rem; }
.pd-close { background: none; border: none; color: var(--cc-text-muted); cursor: pointer; font-size: 1.1rem; }
.pd-close:hover { color: var(--cc-text); }
.pd-save-row { padding: 12px 16px; border-bottom: 1px solid var(--cc-border); display: flex; gap: 8px; flex-shrink: 0; }
.pd-save-row input {
  flex: 1; background: var(--cc-bg-elevated); border: 1px solid var(--cc-border);
  border-radius: var(--cc-radius-sm); color: var(--cc-text); padding: 5px 8px;
  font-size: 0.82rem; outline: none;
}
.pd-save-row input:focus { border-color: var(--cc-accent); }
.pd-save-btn {
  background: var(--cc-accent); border: none; border-radius: var(--cc-radius-sm);
  color: #fff; padding: 5px 12px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
}
.pd-list { flex: 1; overflow-y: auto; padding: 8px; }
.pd-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--cc-radius-sm);
  cursor: pointer; transition: background 0.1s;
  border: 1px solid transparent;
}
.pd-item:hover { background: var(--cc-bg-elevated); }
.pd-item-name { flex: 1; font-size: 0.85rem; font-weight: 500; }
.pd-item-date { font-size: 0.72rem; color: var(--cc-text-muted); }
.pd-item-load {
  background: none; border: 1px solid var(--cc-border); border-radius: 4px;
  color: var(--cc-text-secondary); font-size: 0.75rem; padding: 2px 8px; cursor: pointer;
}
.pd-item-load:hover { border-color: var(--cc-accent); color: var(--cc-accent); }
.pd-item-del {
  background: none; border: none; color: var(--cc-text-muted); cursor: pointer;
  font-size: 0.85rem; padding: 2px 5px; border-radius: 3px;
}
.pd-item-del:hover { color: var(--cc-danger); background: rgba(239,68,68,0.1); }
.pd-empty { color: var(--cc-text-muted); font-size: 0.82rem; text-align: center; padding: 24px 16px; }

/* ── Context Menu ── */
#ctx-menu {
  position: fixed;
  background: var(--cc-bg-card);
  border: 1px solid var(--cc-border);
  border-radius: var(--cc-radius);
  padding: 5px;
  min-width: 190px;
  box-shadow: 0 8px 28px var(--cc-shadow);
  z-index: 900;
  display: none;
}
#ctx-menu.open { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: var(--cc-radius-sm);
  border: none; width: 100%;
  background: transparent; color: var(--cc-text);
  font-size: 0.83rem; cursor: pointer; text-align: left;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--cc-bg-elevated); }
.ctx-item.danger { color: var(--cc-danger); }
.ctx-item.danger:hover { background: rgba(239,68,68,0.1); }
.ctx-item .ctx-icon { width: 16px; text-align: center; font-size: 0.9rem; }

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────
const GRID       = 20;
const SNAP_TH    = 8;
const MIN_W      = 100;
const MIN_H      = 60;
const DEF_COLORS = ["#8B5CF6","#EC4899","#06B6D4","#10B981","#F59E0B","#EF4444","#A78BFA","#F472B6"];

// ─── WIDGET REGISTRY ──────────────────────────────────────────────────────
const WIDGET_DEFS = [

  { type:"line",         label:"Line",           icon:"📈", cat:"Charts",  dw:480, dh:300 },

  { type:"boxplot",      label:"Box Plot",       icon:"⊞",  cat:"Charts",  dw:380, dh:300 },
  { type:"kpi",          label:"KPI Card",       icon:"🔢", cat:"KPIs",    dw:220, dh:130 },
  { type:"metric",       label:"Metric",         icon:"💯", cat:"KPIs",    dw:240, dh:170 },
  { type:"table",        label:"Data Table",     icon:"⊟",  cat:"Tables",  dw:640, dh:380 },
  { type:"filter-select",label:"Dropdown",       icon:"▾",  cat:"Filters", dw:200, dh:80  },
  { type:"filter-multi", label:"Multi-Select",   icon:"☑",  cat:"Filters", dw:220, dh:100 },
  { type:"filter-date",  label:"Date Range",     icon:"📅", cat:"Filters", dw:280, dh:80  },
  { type:"filter-slider",label:"Slider",         icon:"⇔",  cat:"Filters", dw:280, dh:80  },
  { type:"filter-text",  label:"Search Box",     icon:"🔍", cat:"Filters", dw:220, dh:80  },
  { type:"section_header",label:"Section Header",icon:"H",  cat:"Layout",  dw:820, dh:72  },
  { type:"text",         label:"Text Block",     icon:"T",  cat:"Layout",  dw:420, dh:100 },
  { type:"divider",      label:"Divider",        icon:"—",  cat:"Layout",  dw:820, dh:28  },
  { type:"spacer",       label:"Spacer",         icon:"↕",  cat:"Layout",  dw:820, dh:40  },
];

// ─── SAMPLE DATA ──────────────────────────────────────────────────────────
const SAMPLE = {
  bar:      { labels:["Q1","Q2","Q3","Q4"], datasets:[{label:"Revenue",data:[100,160,140,220]}] },
  line:     { labels:["Jan","Feb","Mar","Apr","May"], datasets:[{label:"Users",data:[500,620,580,750,900]}] },
  area:     { labels:["Jan","Feb","Mar","Apr","May"], datasets:[{label:"Sales",data:[80,120,100,160,200]}] },
  pie:      { labels:["A","B","C","D"], datasets:[{label:"",data:[40,25,20,15]}] },
  donut:    { labels:["A","B","C"], datasets:[{label:"",data:[50,30,20]}] },
  scatter:  { points:[{x:1,y:2},{x:3,y:5},{x:5,y:3},{x:7,y:8},{x:9,y:6},{x:2,y:7},{x:6,y:1}] },
  heatmap:  { x_labels:["Mon","Tue","Wed","Thu","Fri"], y_labels:["AM","PM"], matrix:[[8,5,3,7,9],[4,6,8,2,5]] },
  radar:    { labels:["Speed","Power","Accuracy","Stamina","Agility"], datasets:[{label:"Team",data:[80,70,90,60,85]}] },
  waterfall:{ labels:["Start","Sales","COGS","Gross","OpEx","Net"], datasets:[{label:"",data:[0,200,-80,0,-60,0]}] },
  funnel:   { labels:["Leads","Qualified","Proposal","Won"], datasets:[{label:"",data:[1000,600,300,80]}] },
  treemap:  { name:"root", children:[{name:"A",value:40},{name:"B",value:30},{name:"C",value:20},{name:"D",value:10}] },
  sankey:   { nodes:[{name:"A"},{name:"B"},{name:"C"},{name:"D"}], links:[{source:"A",target:"B",value:10},{source:"A",target:"C",value:8},{source:"B",target:"D",value:6}] },
  gauge:    { value:72, min:0, max:100 },
  candlestick:{ohlc:[{date:"W1",open:100,high:120,low:95,close:115},{date:"W2",open:115,high:130,low:110,close:125},{date:"W3",open:125,high:140,low:118,close:132}]},
  histogram:{ labels:["10","20","30","40","50","60"], datasets:[{label:"",data:[12,24,18,30,15,8]}] },
  boxplot:  { labels:["A","B","C"], datasets:[{label:"",data:[[10,20,30,40,50],[15,25,35,45,55],[5,15,25,35,45]]}] },
  table:    { columns:["Name","Value","Change"], rows:[["Alpha",100,"+5%"],["Beta",85,"-2%"],["Gamma",120,"+8%"]] },
  metric:   { value:"42,000", trend:12.5 },
  kpi:      null,
};

// ─── STATE ────────────────────────────────────────────────────────────────
let widgets     = [];
let selectedIds = new Set();   // multi-select
let history     = [];
let future      = [];
let gridOn      = false;
let snapOn      = true;
let propsTab    = "style";
const _charts   = {};          // echarts instances by widget id

// ─── HISTORY ──────────────────────────────────────────────────────────────
function snap()  { return JSON.parse(JSON.stringify(widgets)); }
function push()  { history.push(snap()); future = []; updateUndoRedo(); }
function undo()  { if (!history.length) return; future.push(snap()); widgets = history.pop(); selectedIds.clear(); repaint(); updateUndoRedo(); renderProps(); syncCode(); }
function redo()  { if (!future.length) return; history.push(snap()); widgets = future.pop(); selectedIds.clear(); repaint(); updateUndoRedo(); renderProps(); syncCode(); }
function updateUndoRedo() {
  document.getElementById("btn-undo").disabled = !history.length;
  document.getElementById("btn-redo").disabled = !future.length;
}

// ─── WIDGET ACCESSORS ─────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2, 8);
const getW = id => widgets.find(w => w.id === id);
const def  = type => WIDGET_DEFS.find(d => d.type === type) || { dw:380, dh:280 };

// ─── SELECTION ────────────────────────────────────────────────────────────
function select(id, multi = false) {
  if (!multi) { selectedIds.clear(); }
  if (id) {
    if (multi && selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
  }
  updateSelectionUI();
  renderProps();
}
function clearSel() { selectedIds.clear(); updateSelectionUI(); renderProps(); }

function updateSelectionUI() {
  // Update widget border classes
  document.querySelectorAll(".cc-widget").forEach(el => {
    const id = el.dataset.id;
    el.classList.remove("selected", "multi-selected");
    if (selectedIds.size === 1 && selectedIds.has(id)) el.classList.add("selected");
    else if (selectedIds.size > 1 && selectedIds.has(id)) el.classList.add("multi-selected");
  });
  // Show alignment tools when 2+
  const alignTools = document.getElementById("align-tools");
  alignTools.classList.toggle("visible", selectedIds.size >= 2);
  // Update selection badge on last selected
  document.querySelectorAll(".cc-select-badge").forEach(b => b.style.display = "none");
  if (selectedIds.size > 1) {
    const ids = [...selectedIds];
    const leaderEl = document.getElementById("w-" + ids[ids.length - 1]);
    if (leaderEl) {
      const badge = leaderEl.querySelector(".cc-select-badge");
      if (badge) { badge.style.display = "block"; badge.textContent = selectedIds.size + " selected"; }
    }
  }
}

// ─── Z-ORDER ──────────────────────────────────────────────────────────────
function reindexZ() {
  // Assign zIndex based on array order
  widgets.forEach((w, i) => {
    w.zIndex = i + 1;
    const el = document.getElementById("w-" + w.id);
    if (el) el.style.zIndex = w.zIndex;
  });
}

function bringToFront(id) {
  push();
  const idx = widgets.findIndex(w => w.id === id);
  if (idx < 0) return;
  widgets.push(widgets.splice(idx, 1)[0]);
  reindexZ();
  syncCode();
}
function sendToBack(id) {
  push();
  const idx = widgets.findIndex(w => w.id === id);
  if (idx < 0) return;
  widgets.unshift(widgets.splice(idx, 1)[0]);
  reindexZ();
  syncCode();
}
function moveForward(id) {
  const idx = widgets.findIndex(w => w.id === id);
  if (idx < 0 || idx === widgets.length - 1) return;
  push();
  [widgets[idx], widgets[idx+1]] = [widgets[idx+1], widgets[idx]];
  reindexZ();
  syncCode();
}
function moveBackward(id) {
  const idx = widgets.findIndex(w => w.id === id);
  if (idx <= 0) return;
  push();
  [widgets[idx], widgets[idx-1]] = [widgets[idx-1], widgets[idx]];
  reindexZ();
  syncCode();
}

// ─── ALIGNMENT ────────────────────────────────────────────────────────────
function alignWidgets(dir) {
  const sel = widgets.filter(w => selectedIds.has(w.id));
  if (sel.length < 2) return;
  push();
  let ref;
  switch (dir) {
    case "left":    ref = Math.min(...sel.map(w => w.x)); break;
    case "centerX": ref = (Math.min(...sel.map(w => w.x)) + Math.max(...sel.map(w => w.x + w.w))) / 2; break;
    case "right":   ref = Math.max(...sel.map(w => w.x + w.w)); break;
    case "top":     ref = Math.min(...sel.map(w => w.y)); break;
    case "middleY": ref = (Math.min(...sel.map(w => w.y)) + Math.max(...sel.map(w => w.y + w.h))) / 2; break;
    case "bottom":  ref = Math.max(...sel.map(w => w.y + w.h)); break;
  }
  widgets = widgets.map(w => {
    if (!selectedIds.has(w.id)) return w;
    let { x, y } = w;
    switch (dir) {
      case "left":    x = ref; break;
      case "centerX": x = ref - w.w / 2; break;
      case "right":   x = ref - w.w; break;
      case "top":     y = ref; break;
      case "middleY": y = ref - w.h / 2; break;
      case "bottom":  y = ref - w.h; break;
    }
    return { ...w, x, y };
  });
  repaint();
  syncCode();
  toast("Aligned " + dir);
}

function distributeWidgets(dir) {
  const sel = widgets.filter(w => selectedIds.has(w.id));
  if (sel.length < 3) { toast("Select 3+ widgets to distribute"); return; }
  push();
  if (dir === "h") {
    const sorted = [...sel].sort((a, b) => a.x - b.x);
    const first = sorted[0].x;
    const last  = sorted[sorted.length - 1].x + sorted[sorted.length - 1].w;
    const totalW = sel.reduce((s, w) => s + w.w, 0);
    const gap = (last - first - totalW) / (sel.length - 1);
    let cx = first;
    const pos = {};
    sorted.forEach(w => { pos[w.id] = cx; cx += w.w + gap; });
    widgets = widgets.map(w => selectedIds.has(w.id) ? { ...w, x: pos[w.id] } : w);
  } else {
    const sorted = [...sel].sort((a, b) => a.y - b.y);
    const first = sorted[0].y;
    const last  = sorted[sorted.length - 1].y + sorted[sorted.length - 1].h;
    const totalH = sel.reduce((s, w) => s + w.h, 0);
    const gap = (last - first - totalH) / (sel.length - 1);
    let cy = first;
    const pos = {};
    sorted.forEach(w => { pos[w.id] = cy; cy += w.h + gap; });
    widgets = widgets.map(w => selectedIds.has(w.id) ? { ...w, y: pos[w.id] } : w);
  }
  repaint();
  syncCode();
  toast("Distributed");
}

// ─── SNAP GUIDES ──────────────────────────────────────────────────────────
let _snapGuides = [];

function computeSnap(movingIds, candidateX, candidateY, cW, cH) {
  if (!snapOn) return { x: candidateX, y: candidateY };
  const others = widgets.filter(w => !movingIds.has(w.id));
  let sx = candidateX, sy = candidateY;
  const guides = [];
  let snappedX = false, snappedY = false;

  const myEdgesX = [candidateX, candidateX + cW / 2, candidateX + cW];
  const myEdgesY = [candidateY, candidateY + cH / 2, candidateY + cH];

  for (const o of others) {
    const oxE = [o.x, o.x + o.w / 2, o.x + o.w];
    const oyE = [o.y, o.y + o.h / 2, o.y + o.h];
    if (!snappedX) {
      for (const me of myEdgesX) {
        for (const oe of oxE) {
          if (Math.abs(me - oe) < SNAP_TH) {
            sx = candidateX + (oe - me);
            snappedX = true;
            guides.push({ type:"v", x: oe, y1: Math.min(candidateY, o.y) - 20, y2: Math.max(candidateY + cH, o.y + o.h) + 20 });
            break;
          }
        }
        if (snappedX) break;
      }
    }
    if (!snappedY) {
      for (const me of myEdgesY) {
        for (const oe of oyE) {
          if (Math.abs(me - oe) < SNAP_TH) {
            sy = candidateY + (oe - me);
            snappedY = true;
            guides.push({ type:"h", y: oe, x1: Math.min(candidateX, o.x) - 20, x2: Math.max(candidateX + cW, o.x + o.w) + 20 });
            break;
          }
        }
        if (snappedY) break;
      }
    }
  }
  _snapGuides = guides;
  drawSnapGuides();
  return { x: sx, y: sy };
}

function drawSnapGuides() {
  const svg = document.getElementById("snap-guides");
  const cH  = document.getElementById("canvas").offsetHeight;
  const cW  = document.getElementById("canvas").offsetWidth;
  svg.innerHTML = _snapGuides.map(g => {
    if (g.type === "v") return `<line x1="${g.x}" y1="${Math.max(0,g.y1)}" x2="${g.x}" y2="${Math.min(cH,g.y2)}" stroke="#EF4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>`;
    return `<line x1="${Math.max(0,g.x1)}" y1="${g.y}" x2="${Math.min(cW,g.x2)}" y2="${g.y}" stroke="#06B6D4" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>`;
  }).join("");
}

function clearSnapGuides() { _snapGuides = []; drawSnapGuides(); }

// ─── REPAINT ──────────────────────────────────────────────────────────────
function repaint() {
  const canvas = document.getElementById("canvas");
  // Remove existing widgets
  canvas.querySelectorAll(".cc-widget").forEach(el => {
    const id = el.dataset.id;
    if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
    el.remove();
  });
  // Re-append in z-order
  widgets.forEach(w => canvas.appendChild(createWidgetEl(w)));
  updateSelectionUI();
}

// ─── CREATE WIDGET ELEMENT ────────────────────────────────────────────────
function createWidgetEl(w) {
  const el = document.createElement("div");
  el.className = "cc-widget";
  el.id        = "w-" + w.id;
  el.dataset.id = w.id;
  el.style.left   = w.x + "px";
  el.style.top    = w.y + "px";
  el.style.width  = w.w + "px";
  el.style.height = w.h + "px";
  el.style.zIndex = w.zIndex || 1;

  const d = def(w.type);
  el.innerHTML = `
    <div class="cc-widget-inner">
      <div class="cc-widget-header">
        <span class="cc-widget-title">${w.title || d.label}</span>
        <span class="cc-widget-type">${w.type}</span>
        <button class="cc-widget-del" onclick="deleteWidget('${w.id}',event)" title="Delete">&#10007;</button>
      </div>
      <div class="cc-widget-body" id="wb-${w.id}"></div>
    </div>
    <div class="cc-select-badge"></div>
    <div class="rh nw" data-dir="nw"></div>
    <div class="rh ne" data-dir="ne"></div>
    <div class="rh sw" data-dir="sw"></div>
    <div class="rh se" data-dir="se"></div>
    <div class="rh n"  data-dir="n"></div>
    <div class="rh s"  data-dir="s"></div>
    <div class="rh e"  data-dir="e"></div>
    <div class="rh w"  data-dir="w"></div>
  `;

  attachWidgetEvents(el, w);
  requestAnimationFrame(() => renderPreview(w));
  return el;
}

// ─── WIDGET EVENTS (move + resize) ────────────────────────────────────────
let _drag = null;

function attachWidgetEvents(el, w) {
  // Select on click
  el.addEventListener("click", e => {
    if (e.target.classList.contains("rh") || e.target.classList.contains("cc-widget-del")) return;
    e.stopPropagation();
    select(w.id, e.shiftKey);
  });

  // Right-click → context menu
  el.addEventListener("contextmenu", e => {
    e.preventDefault();
    if (!selectedIds.has(w.id)) select(w.id, false);
    openCtxMenu(e.clientX, e.clientY, w.id);
  });

  // Move — PointerEvents
  el.addEventListener("pointerdown", e => {
    if (e.target.classList.contains("rh") || e.target.classList.contains("cc-widget-del")) return;
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    push();

    if (!selectedIds.has(w.id)) select(w.id, e.shiftKey);

    // Capture initial positions of all selected widgets
    const origins = {};
    selectedIds.forEach(id => { const g = getW(id); if (g) origins[id] = { x: g.x, y: g.y }; });

    _drag = { type:"move", ids: new Set(selectedIds), startX: e.clientX, startY: e.clientY, origins };
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener("pointermove", e => {
    if (!_drag || _drag.type !== "move" || !_drag.ids.has(w.id)) return;
    const dx = e.clientX - _drag.startX;
    const dy = e.clientY - _drag.startY;

    // Compute snap for the primary widget (the one being dragged)
    const orig = _drag.origins[w.id];
    let tx = orig.x + dx;
    let ty = orig.y + dy;
    if (gridOn) { tx = Math.round(tx / GRID) * GRID; ty = Math.round(ty / GRID) * GRID; }
    const snapped = computeSnap(_drag.ids, tx, ty, w.w, w.h);
    const snapDX = snapped.x - tx;
    const snapDY = snapped.y - ty;

    // Move all selected widgets
    _drag.ids.forEach(id => {
      const wEl = document.getElementById("w-" + id);
      const orig2 = _drag.origins[id];
      if (!orig2 || !wEl) return;
      let nx = Math.max(0, orig2.x + dx + snapDX);
      let ny = Math.max(0, orig2.y + dy + snapDY);
      if (gridOn) { nx = Math.round(nx / GRID) * GRID; ny = Math.round(ny / GRID) * GRID; }
      wEl.style.left = nx + "px";
      wEl.style.top  = ny + "px";
    });
  });

  el.addEventListener("pointerup", e => {
    if (!_drag || _drag.type !== "move" || !_drag.ids.has(w.id)) return;
    // Commit positions to state
    _drag.ids.forEach(id => {
      const wEl = document.getElementById("w-" + id);
      if (!wEl) return;
      const wData = getW(id);
      if (wData) {
        wData.x = parseInt(wEl.style.left) || 0;
        wData.y = parseInt(wEl.style.top)  || 0;
      }
    });
    _drag = null;
    clearSnapGuides();
    syncCode();
  });

  // Resize — PointerEvents on handles
  el.querySelectorAll(".rh").forEach(rh => {
    rh.addEventListener("pointerdown", e => {
      e.stopPropagation();
      e.preventDefault();
      push();
      const dir = rh.dataset.dir;
      _drag = { type:"resize", id: w.id, dir, startX: e.clientX, startY: e.clientY, origW: w.w, origH: w.h, origX: w.x, origY: w.y };
      rh.setPointerCapture(e.pointerId);
    });

    rh.addEventListener("pointermove", e => {
      if (!_drag || _drag.type !== "resize" || _drag.id !== w.id) return;
      const dx = e.clientX - _drag.startX;
      const dy = e.clientY - _drag.startY;
      const d  = _drag.dir;
      let { origW, origH, origX, origY } = _drag;
      let nw = origW, nh = origH, nx = origX, ny = origY;

      if (d.includes("e")) nw = Math.max(MIN_W, origW + dx);
      if (d.includes("s")) nh = Math.max(MIN_H, origH + dy);
      if (d.includes("w")) { nw = Math.max(MIN_W, origW - dx); nx = origX + origW - nw; }
      if (d.includes("n")) { nh = Math.max(MIN_H, origH - dy); ny = origY + origH - nh; }

      if (gridOn) { nw = Math.round(nw / GRID) * GRID; nh = Math.round(nh / GRID) * GRID; nx = Math.round(nx / GRID) * GRID; ny = Math.round(ny / GRID) * GRID; }

      el.style.width  = nw + "px";
      el.style.height = nh + "px";
      el.style.left   = nx + "px";
      el.style.top    = ny + "px";

      // Resize chart
      if (_charts[w.id]) _charts[w.id].resize();
    });

    rh.addEventListener("pointerup", e => {
      if (!_drag || _drag.type !== "resize" || _drag.id !== w.id) return;
      w.w = parseInt(el.style.width)  || w.w;
      w.h = parseInt(el.style.height) || w.h;
      w.x = parseInt(el.style.left)   || w.x;
      w.y = parseInt(el.style.top)    || w.y;
      // Re-render preview at new size
      if (_charts[w.id]) { try { _charts[w.id].dispose(); } catch(e) {} delete _charts[w.id]; }
      renderPreview(w);
      _drag = null;
      syncCode();
    });
  });
}

// ─── MARQUEE SELECTION ────────────────────────────────────────────────────
let _marquee = null;

document.getElementById("canvas").addEventListener("pointerdown", e => {
  if (e.button !== 0) return;
  if (e.target !== document.getElementById("canvas") &&
      !e.target.classList.contains("cc-widget-body") &&
      e.target.id !== "canvas" && e.target.id !== "grid-dots") return;

  if (!e.shiftKey) clearSel();
  const rect = document.getElementById("canvas").getBoundingClientRect();
  _marquee = { x1: e.clientX - rect.left, y1: e.clientY - rect.top, x2: e.clientX - rect.left, y2: e.clientY - rect.top };
  document.getElementById("marquee").style.display = "block";

  document.getElementById("canvas").setPointerCapture(e.pointerId);
});

document.getElementById("canvas").addEventListener("pointermove", e => {
  if (!_marquee) return;
  const rect = document.getElementById("canvas").getBoundingClientRect();
  _marquee.x2 = e.clientX - rect.left;
  _marquee.y2 = e.clientY - rect.top;
  const mx = Math.min(_marquee.x1, _marquee.x2);
  const my = Math.min(_marquee.y1, _marquee.y2);
  const mw = Math.abs(_marquee.x2 - _marquee.x1);
  const mh = Math.abs(_marquee.y2 - _marquee.y1);
  const marqEl = document.getElementById("marquee");
  marqEl.style.left   = mx + "px";
  marqEl.style.top    = my + "px";
  marqEl.style.width  = mw + "px";
  marqEl.style.height = mh + "px";
});

document.getElementById("canvas").addEventListener("pointerup", e => {
  if (!_marquee) return;
  const mx1 = Math.min(_marquee.x1, _marquee.x2);
  const my1 = Math.min(_marquee.y1, _marquee.y2);
  const mx2 = Math.max(_marquee.x1, _marquee.x2);
  const my2 = Math.max(_marquee.y1, _marquee.y2);
  // Select widgets that intersect the marquee
  if (mx2 - mx1 > 4 || my2 - my1 > 4) {
    widgets.forEach(w => {
      if (w.x < mx2 && w.x + w.w > mx1 && w.y < my2 && w.y + w.h > my1) {
        selectedIds.add(w.id);
      }
    });
    updateSelectionUI();
    renderProps();
  }
  _marquee = null;
  document.getElementById("marquee").style.display = "none";
});

// ─── ECHARTS PREVIEW ──────────────────────────────────────────────────────
function renderPreview(w) {
  const body = document.getElementById("wb-" + w.id);
  if (!body) return;
  const type = w.type;
  const colors = w.colors || DEF_COLORS;

  if (type === "kpi") {
    body.innerHTML = `<div style="padding:8px">
      <div style="font-size:0.7rem;color:var(--cc-text-muted);text-transform:uppercase;letter-spacing:.05em">${w.title||"KPI"}</div>
      <div style="font-size:1.6rem;font-weight:800;color:var(--cc-text);font-family:var(--cc-font-mono)">${w.kpiValue||"—"}</div>
      ${w.change !== undefined ? `<div style="font-size:0.75rem;color:var(--cc-success)">&#9650; ${w.change}%</div>` : ""}
    </div>`;
    return;
  }
  if (["divider","spacer","text","section_header","filter-select","filter-multi","filter-date","filter-slider","filter-text"].includes(type)) {
    const icons = { divider:"—", spacer:"&#8597;", text:"T", section_header:"H", "filter-select":"&#9660;", "filter-multi":"&#9745;", "filter-date":"&#128197;", "filter-slider":"&#8660;", "filter-text":"&#128269;" };
    body.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--cc-text-muted);font-size:1.2rem;gap:8px">
      <span>${icons[type]||""}</span><span style="font-size:0.78rem">${type.replace("-"," ")}</span>
    </div>`;
    return;
  }
  if (type === "metric") {
    body.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px">
      <div style="font-size:2rem;font-weight:800;color:${colors[0]};font-family:var(--cc-font-mono)">${w.metricValue||"42,000"}</div>
      <div style="font-size:0.75rem;color:var(--cc-success)">&#9650; ${w.trend||"12.5"}%</div>
    </div>`;
    return;
  }
  if (type === "table") {
    const cols = ["Name","Value","Change"];
    const rows = [["Alpha","100","+5%"],["Beta","85","-2%"],["Gamma","120","+8%"]];
    body.innerHTML = `<div style="overflow:auto;height:100%;font-size:0.74rem">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>${cols.map(c=>`<th style="padding:5px 8px;border-bottom:1px solid var(--cc-border);color:var(--cc-text-muted);text-align:left">${c}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${r.map(v=>`<td style="padding:4px 8px;border-bottom:1px solid var(--cc-grid)">${v}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>
    </div>`;
    return;
  }

  // ECharts types
  if (_charts[w.id]) { try { _charts[w.id].dispose(); } catch(e) {} }
  body.style.height = (w.h - 34) + "px";
  const div = document.createElement("div");
  div.style.width = div.style.height = "100%";
  body.innerHTML = "";
  body.appendChild(div);

  try {
    const chart = echarts.init(div, null, { renderer:"canvas" });
    _charts[w.id] = chart;
    const ax = { axisLine:{lineStyle:{color:"#3F3F46"}}, axisLabel:{color:"#71717A",fontSize:9}, splitLine:{lineStyle:{color:"#27272A"}} };
    const data = SAMPLE[type] || SAMPLE.bar;
    const option = buildPreviewOption(type, data, colors, ax);
    if (option) chart.setOption(option);
    const ro = new ResizeObserver(() => chart.resize());
    ro.observe(div);
  } catch(e) {
    body.innerHTML = `<div style="padding:8px;color:var(--cc-text-muted);font-size:0.75rem">${type}</div>`;
  }
}

function buildPreviewOption(type, d, colors, ax) {
  const base = { animation:false, grid:{top:10,bottom:20,left:8,right:8,containLabel:true} };
  if (["bar","histogram"].includes(type)) return { ...base, xAxis:{type:"category",data:d.labels,...ax}, yAxis:{type:"value",...ax},
    series:[{type:"bar",data:d.datasets[0]?.data||[],itemStyle:{color:colors[0],borderRadius:[3,3,0,0]}}] };
  if (type==="line") return { ...base, xAxis:{type:"category",data:d.labels,...ax}, yAxis:{type:"value",...ax},
    series:[{type:"line",data:d.datasets[0]?.data||[],smooth:true,showSymbol:false,lineStyle:{color:colors[0]},itemStyle:{color:colors[0]}}] };
  if (type==="area") return { ...base, xAxis:{type:"category",data:d.labels,...ax}, yAxis:{type:"value",...ax},
    series:[{type:"line",data:d.datasets[0]?.data||[],smooth:true,showSymbol:false,lineStyle:{color:colors[0]},itemStyle:{color:colors[0]},
      areaStyle:{color:{type:"linear",x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:colors[0]+"AA"},{offset:1,color:colors[0]+"11"}]}}}] };
  if (["pie","donut"].includes(type)) {
    const pdata = (d.labels||[]).map((l,i)=>({name:l,value:d.datasets[0]?.data[i]||0,itemStyle:{color:colors[i%colors.length]}}));
    return { series:[{type:"pie",radius:type==="donut"?["38%","68%"]:"65%",data:pdata,label:{show:false},animation:false}] };
  }
  if (type==="scatter") return { ...base, xAxis:{type:"value",...ax}, yAxis:{type:"value",...ax},
    series:[{type:"scatter",data:(d.points||[]).map(p=>[p.x,p.y]),itemStyle:{color:colors[0],opacity:0.8},symbolSize:7}] };
  if (type==="radar") return { radar:{indicator:(d.labels||[]).map(l=>({name:l})),shape:"polygon",axisName:{color:"#71717A",fontSize:8},splitLine:{lineStyle:{color:"#27272A"}}},
    series:[{type:"radar",data:[{value:d.datasets[0]?.data||[]}],areaStyle:{opacity:0.2},lineStyle:{color:colors[0]},itemStyle:{color:colors[0]}}],animation:false };
  if (type==="gauge") return { series:[{type:"gauge",data:[{value:d.value||72}],animation:false,
    axisLine:{lineStyle:{width:8,color:[[0.6,"#10B981"],[0.8,"#F59E0B"],[1,"#EF4444"]]}},
    pointer:{show:true},axisTick:{show:false},splitLine:{show:false},axisLabel:{color:"#71717A",fontSize:9},detail:{fontSize:12,color:"#FAFAFA"}}] };
  if (type==="funnel") {
    const fd=(d.labels||[]).map((l,i)=>({name:l,value:d.datasets[0]?.data[i]||0,itemStyle:{color:colors[i%colors.length]}})).sort((a,b)=>b.value-a.value);
    return { series:[{type:"funnel",data:fd,label:{show:false},animation:false,left:"5%",width:"90%",top:10,bottom:10,gap:2}] };
  }
  if (type==="treemap") return { series:[{type:"treemap",data:[d],animation:false,label:{color:"#fff",fontSize:9},breadcrumb:{show:false}}] };
  if (type==="sankey") return { series:[{type:"sankey",data:d.nodes,links:d.links,animation:false,label:{color:"#FAFAFA",fontSize:9},lineStyle:{color:"gradient",opacity:0.35}}] };
  if (type==="waterfall") {
    const vals=d.datasets[0]?.data||[]; let run=0;
    const helpers=[],bars=[];
    vals.forEach((v,i)=>{ helpers.push(v>=0?run:run+v); run+=v; bars.push({value:Math.abs(v),itemStyle:{color:v>=0?colors[0]:(colors[3]||"#EF4444")}}); });
    return { ...base, xAxis:{type:"category",data:d.labels,...ax}, yAxis:{type:"value",...ax},
      series:[{type:"bar",stack:"w",data:helpers,itemStyle:{color:"transparent"}},{type:"bar",stack:"w",data:bars}] };
  }
  if (type==="heatmap") {
    const mat=[];(d.matrix||[]).forEach((row,yi)=>row.forEach((val,xi)=>mat.push([xi,yi,val])));
    return { xAxis:{type:"category",data:d.x_labels,...ax}, yAxis:{type:"category",data:d.y_labels,...ax},
      visualMap:{min:0,max:10,show:false,inRange:{color:["#313695","#abd9e9","#ffffbf","#a50026"]}},
      series:[{type:"heatmap",data:mat,label:{show:false}}],animation:false };
  }
  if (type==="candlestick") {
    const ohlc=d.ohlc||[];
    return { ...base, xAxis:{type:"category",data:ohlc.map(r=>r.date),...ax}, yAxis:{type:"value",scale:true,...ax},
      series:[{type:"candlestick",data:ohlc.map(r=>[r.open,r.close,r.low,r.high]),itemStyle:{color:colors[0],color0:(colors[3]||"#EF4444"),borderColor:colors[0],borderColor0:(colors[3]||"#EF4444")}}] };
  }
  return null;
}

// ─── DROP FROM LIBRARY ────────────────────────────────────────────────────
const canvasEl = document.getElementById("canvas");

document.querySelectorAll(".wl-item").forEach(item => {
  item.addEventListener("dragstart", e => { e.dataTransfer.setData("wtype", item.dataset.type); });
});
canvasEl.addEventListener("dragover", e => e.preventDefault());
canvasEl.addEventListener("drop", e => {
  e.preventDefault();
  const type = e.dataTransfer.getData("wtype");
  if (!type) return;
  const rect = canvasEl.getBoundingClientRect();
  const d    = def(type);
  let x = e.clientX - rect.left - d.dw / 2;
  let y = e.clientY - rect.top  - d.dh / 2;
  if (gridOn) { x = Math.round(x / GRID) * GRID; y = Math.round(y / GRID) * GRID; }
  addWidget(type, Math.max(0, x), Math.max(0, y));
});

function addWidget(type, x, y) {
  const d = def(type);
  push();
  const w = { id: uid(), type, x, y, w: d.dw, h: d.dh, zIndex: widgets.length + 1,
    title: d.label, colors: [...DEF_COLORS],
    animate: true, animate_duration: 800, col: 0, colspan: 12, refresh: null,
    click_action: null, click_target: "", tooltip: true };
  widgets.push(w);
  canvasEl.appendChild(createWidgetEl(w));
  select(w.id, false);
  syncCode();
  toast("Added " + d.label);
}

// ─── DELETE WIDGET ────────────────────────────────────────────────────────
function deleteWidget(id, e) {
  if (e) e.stopPropagation();
  push();
  if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
  document.getElementById("w-" + id)?.remove();
  widgets = widgets.filter(w => w.id !== id);
  selectedIds.delete(id);
  updateSelectionUI();
  renderProps();
  syncCode();
}

function deleteSelected() {
  if (!selectedIds.size) return;
  push();
  [...selectedIds].forEach(id => {
    if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
    document.getElementById("w-" + id)?.remove();
    widgets = widgets.filter(w => w.id !== id);
  });
  selectedIds.clear();
  updateSelectionUI();
  renderProps();
  syncCode();
}

function duplicateSelected() {
  if (!selectedIds.size) return;
  push();
  const newIds = new Set();
  [...selectedIds].forEach(id => {
    const w = getW(id);
    if (!w) return;
    const nw = JSON.parse(JSON.stringify(w));
    nw.id = uid();
    nw.x += 20; nw.y += 20;
    nw.zIndex = widgets.length + 1;
    widgets.push(nw);
    canvasEl.appendChild(createWidgetEl(nw));
    newIds.add(nw.id);
  });
  selectedIds.clear();
  newIds.forEach(id => selectedIds.add(id));
  updateSelectionUI();
  renderProps();
  syncCode();
  toast("Duplicated");
}

// ─── CONTEXT MENU ─────────────────────────────────────────────────────────
let _ctxId = null;

function openCtxMenu(x, y, id) {
  _ctxId = id;
  const menu = document.getElementById("ctx-menu");
  menu.style.left = x + "px";
  menu.style.top  = y + "px";
  menu.classList.add("open");
  // Adjust if off screen
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  menu.style.left = (x - r.width)  + "px";
    if (r.bottom > window.innerHeight) menu.style.top  = (y - r.height) + "px";
  });
}

function closeCtxMenu() { document.getElementById("ctx-menu").classList.remove("open"); }

function ctxAction(action) {
  closeCtxMenu();
  const id = _ctxId;
  if (!id) return;
  switch (action) {
    case "front":     bringToFront(id); break;
    case "forward":   moveForward(id); break;
    case "back":      moveBackward(id); break;
    case "behind":    sendToBack(id); break;
    case "duplicate": if (!selectedIds.has(id)) select(id); duplicateSelected(); break;
    case "delete":    deleteWidget(id); break;
  }
}

document.addEventListener("click", e => {
  if (!e.target.closest("#ctx-menu")) closeCtxMenu();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeCtxMenu();
});

// ─── PROPERTIES PANEL ─────────────────────────────────────────────────────
function renderProps() {
  const body = document.getElementById("pp-body");
  const titleEl = document.getElementById("pp-title");
  const typeEl  = document.getElementById("pp-type");

  if (selectedIds.size === 0) {
    titleEl.textContent = "Properties";
    typeEl.textContent  = "";
    body.innerHTML = `<div class="pp-empty">Select a widget on the canvas to edit its properties.<br><br>Shift+click to multi-select.<br>Right-click for more options.</div>`;
    return;
  }

  if (selectedIds.size > 1) {
    titleEl.textContent = selectedIds.size + " widgets";
    typeEl.textContent  = "multi";
    body.innerHTML = `<div style="padding:8px 0">
      <p style="font-size:0.82rem;color:var(--cc-text-secondary);margin-bottom:12px">${selectedIds.size} widgets selected</p>
      <div class="pp-section-label">Alignment</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">
        <button class="pp-delete-btn" style="margin:0;color:var(--cc-text-secondary);border-color:var(--cc-border)" onclick="alignWidgets('left')">Align Left</button>
        <button class="pp-delete-btn" style="margin:0;color:var(--cc-text-secondary);border-color:var(--cc-border)" onclick="alignWidgets('centerX')">Center X</button>

function propSet(id, key, val) {
  const w = getW(id);
  if (!w) return;
  w[key] = val;
  syncCode();
}
function propSetNum(id, key, val) { propSet(id, key, parseFloat(val) || 0); }
function propToggle(id, key, btn) {
  const w = getW(id);
  if (!w) return;
  w[key] = !w[key];
  btn.classList.toggle("on", w[key]);
  syncCode();
}

// ── Active CCColorPicker instance (singleton) ─────────────────────────────────
let _ccPicker = null;

function openColorPicker(idx, id, swatchEl) {
  const w = getW(id);
  if (!w) return;
  if (!w.colors) w.colors = [...DEF_COLORS];
  const initialColor = w.colors[idx] || "#6366F1";

  // Close any existing picker
  if (_ccPicker) { _ccPicker.destroy(); _ccPicker = null; }

  // Use CCColorPicker if available, fallback to native input
  if (window.CCColorPicker) {
    _ccPicker = new CCColorPicker(swatchEl, {
      value: initialColor,
      showGradient: false,
      showHarmonies: true,
      onChange(hex) {
        w.colors[idx] = hex;
        swatchEl.style.background = hex;
        if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
        renderPreview(w);
        syncCode();
      },
      onApply(hex) {
        w.colors[idx] = hex;
        swatchEl.style.background = hex;
        if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
        renderPreview(w);
        syncCode();
        _ccPicker = null;
      },
    });
    _ccPicker.open();
  } else {
    // Fallback: native color input
    const input = document.createElement("input");
    input.type = "color";
    input.value = initialColor;
    input.oninput = () => {
      w.colors[idx] = input.value;
      swatchEl.style.background = input.value;
      if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
      renderPreview(w);
      syncCode();
    };
    input.click();
  }
}

function addColor(id) {
  const w = getW(id);
  if (!w) return;
  if (!w.colors) w.colors = [...DEF_COLORS];
  // Open picker for the new color slot
  w.colors.push("#6366F1");
  renderProps();
  // Open picker on the last chip
  const chips = document.querySelectorAll(".pp-color-swatch");
  if (chips.length) openColorPicker(w.colors.length - 1, id, chips[chips.length - 1]);
  syncCode();
}

/**
 * Open color picker for a single-value color property (not a colors array slot).
 * @param {string} id - widget id
 * @param {string} prop - property key (e.g. 'bg_color')
 * @param {HTMLElement} swatchEl - the swatch element to position near and update
 */
function openSingleColorPicker(id, prop, swatchEl) {
  const w = getW(id);
  if (!w) return;
  const initialColor = w[prop] || "#6366F1";

  if (_ccPicker) { _ccPicker.destroy(); _ccPicker = null; }

  if (window.CCColorPicker) {
    _ccPicker = new CCColorPicker(swatchEl, {
      value: initialColor,
      showGradient: false,
      showHarmonies: true,
      onChange(hex) {
        w[prop] = hex;
        swatchEl.style.background = hex;
        if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
        renderPreview(w);
        syncCode();
      },
      onApply(hex) {
        w[prop] = hex;
        swatchEl.style.background = hex;
        if (_charts[id]) { try { _charts[id].dispose(); } catch(e) {} delete _charts[id]; }
        renderPreview(w);
        syncCode();
        _ccPicker = null;
      },
    });
    _ccPicker.open();
  } else {
    const input = document.createElement("input");
    input.type = "color";
    input.value = initialColor;
    input.oninput = () => { w[prop] = input.value; swatchEl.style.background = input.value; syncCode(); };
    input.click();
  }
}

// ─── SQL EDITOR ───────────────────────────────────────────────────────────
let _connectors = [];   // cached connector list

function populateConnectorDropdown(selectId, currentValue) {
  fetch("/api/connections")
    .then(r => r.json())
    .then(list => {
      _connectors = list;
      const sel = document.getElementById(selectId);
      if (!sel) return;
      // Keep first two options, inject connectors after them
      const existing = [...sel.options].filter(o => o.value === "" || o.value === "__add__");
      sel.innerHTML = existing.map(o => `<option value="${o.value}">${o.text}</option>`).join("") +
        list.map(c => `<option value="${c.id}" ${c.id === currentValue ? "selected" : ""}>${c.name}</option>`).join("");
    })
    .catch(() => {});
}

function loadSchemaBrowser(widgetId, connId) {
  const container = document.getElementById(`sql-schema-${widgetId}`);
  if (!container || !connId || connId === "__add__") return;

  const conn = _connectors.find(c => c.id === connId);
  if (!conn) return;

  container.innerHTML = `<div style="font-size:0.7rem;color:var(--cc-text-muted)">Loading schema...</div>`;

  fetch(`/api/schema?conn_id=${encodeURIComponent(connId)}`)
    .then(r => r.json())
    .then(schema => {
      if (schema.error) { container.innerHTML = `<div style="color:var(--cc-danger);font-size:0.75rem">${schema.error}</div>`; return; }
      const tables = schema.tables || [];
      if (!tables.length) { container.innerHTML = `<div style="font-size:0.7rem;color:var(--cc-text-muted)">No tables found</div>`; return; }
      container.innerHTML = `
        <div class="pp-section-label">Schema</div>
        <div id="schema-tree-${widgetId}" style="font-size:0.75rem">
          ${tables.map(t => `
            <div style="margin-bottom:4px">
              <div style="cursor:pointer;color:var(--cc-text-secondary);padding:2px 0"
                onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';insertSql('${widgetId}','${t.name}')">
                &#9654; <b>${t.name}</b> <span style="color:var(--cc-text-muted)">(${t.columns.length} cols)</span>
              </div>
              <div style="display:none;padding-left:12px;color:var(--cc-text-muted)">
                ${t.columns.map(c => `<div style="cursor:pointer;padding:1px 0" onclick="insertSql('${widgetId}','${t.name}.${c.name}')">${c.name} <em style="font-size:0.68rem">${c.type}</em></div>`).join("")}
              </div>
            </div>`).join("")}
        </div>`;
    })
    .catch(() => { container.innerHTML = ""; });
}

function insertSql(widgetId, text) {
  const ta = document.getElementById(`sql-query-${widgetId}`);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + text + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();
  propSet(widgetId, "sql_query", ta.value);
}

function runSqlQuery(widgetId) {
  const w = getW(widgetId);
  if (!w) return;
  const sql     = w.sql_query || document.getElementById(`sql-query-${widgetId}`)?.value || "";
  const connId  = w.sql_conn_id;
  const preview = document.getElementById(`sql-preview-${widgetId}`);
  if (!preview) return;
  if (!sql.trim()) { preview.textContent = "Enter a SQL query above."; return; }

  const conn = _connectors.find(c => c.id === connId);
  const payload = conn ? { conn_id: connId, sql } : { conn_str: w.sql_conn_str || "", sql };

  preview.textContent = "Running...";
  preview.style.color = "var(--cc-text-muted)";

  fetch("/api/query", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...payload, limit: 10 }),
  })
    .then(r => r.json())
    .then(result => {
      if (result.error) {
        preview.innerHTML = `<span style="color:var(--cc-danger)">${result.error}</span>`;
        return;
      }
      const { columns, rows, row_count } = result;
      if (!columns || !columns.length) { preview.textContent = "No results."; return; }
      // Show mini preview table
      const maxCols = Math.min(columns.length, 5);
      const maxRows = Math.min(rows.length, 5);
      const hdr = columns.slice(0, maxCols).map(c => `<th>${c}</th>`).join("");
      const body = rows.slice(0, maxRows).map(r =>
        `<tr>${r.slice(0, maxCols).map(v => `<td>${v ?? ""}</td>`).join("")}</tr>`
      ).join("");
      preview.innerHTML = `
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:0.72rem">
            <thead style="color:var(--cc-text-muted)"><tr>${hdr}</tr></thead>
            <tbody>${body}</tbody>
          </table>
          <div style="margin-top:4px;color:var(--cc-text-muted)">${row_count} total rows${result.truncated ? " (truncated)" : ""}</div>
        </div>`;
      preview.style.color = "var(--cc-text)";

      // Optionally bind result as widget's customData for immediate preview
      if (rows.length > 0) {
        const dataObj = {};
        columns.forEach((col, ci) => { dataObj[col] = rows.map(r => r[ci]); });
        propSet(widgetId, "customData", JSON.stringify(dataObj));
        if (_charts[widgetId]) { try { _charts[widgetId].dispose(); } catch {} delete _charts[widgetId]; }
        renderPreview(w);
        syncCode();
      }
    })
    .catch(e => { preview.innerHTML = `<span style="color:var(--cc-danger)">${e}</span>`; });
}

function openConnectorsPanel(widgetId) {
  // Simple inline add-connector flow using a prompt dialog
  const name = prompt("Connector name (e.g. 'Sales DB'):");
  if (!name) return;
  const connStr = prompt("Connection string:\nsqlite:///path/to/file.db\nor SQLAlchemy URI:");
  if (!connStr) return;
  fetch("/api/connections", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, conn_str: connStr }),
  })
    .then(r => r.json())
    .then(result => {
      toast(`Connector "${name}" saved`);
      // Reload properties to refresh the dropdown
      renderProps();
    })
    .catch(e => toast("Failed: " + e));
}

function removeColor(idx, id) {
  const w = getW(id);
  if (!w || !w.colors) return;
  w.colors.splice(idx, 1);
  renderProps();
  syncCode();
}

// ─── CODE SYNC ────────────────────────────────────────────────────────────
let _syncDirty = false;   // true when canvas → code sync pending

function getCanvasState() {
  const canvasW = canvasEl.offsetWidth || 1200;
  return {
    title: "Dashboard", theme: "default",
    widgets: widgets.map(w => ({
      ...w,
      col:     Math.max(0,  Math.min(11, Math.round(w.x / canvasW * 12))),
      colspan: Math.max(1,  Math.min(12, Math.round(w.w / canvasW * 12))),
      height:  w.h,
    })),
  };
}

function syncCode() {
  const state = getCanvasState();
  fetch("/api/layout", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(state) })
    .then(r => r.json())
    .then(d => {
      if (d.code) {
        const ta = document.getElementById("code-output");
        ta.value = d.code;
        ta.classList.remove("dirty");
        document.getElementById("cp-dirty-badge").classList.remove("visible");
      }
    })
    .catch(() => {});
}

// ─── LIBRARY ──────────────────────────────────────────────────────────────
const LIB_COLLAPSED = {};   // { category: bool }

function buildLibrary(filter = "") {
  const categories = [...new Set(WIDGET_DEFS.map(d => d.cat))];
  const wrap = document.getElementById("lib-sections");
  wrap.innerHTML = "";

  categories.forEach(cat => {
    const items = WIDGET_DEFS.filter(d => d.cat === cat && (!filter || d.label.toLowerCase().includes(filter.toLowerCase()) || d.type.includes(filter.toLowerCase())));
    if (!items.length) return;

    const collapsed = LIB_COLLAPSED[cat] || false;
    const section   = document.createElement("div");
    section.className = "wl-section" + (collapsed ? " collapsed" : "");

    section.innerHTML = `
      <div class="wl-section-header" onclick="toggleLibSection('${cat}')">
        <span class="wl-section-title">${cat}</span>
        <span class="wl-section-arrow">&#9660;</span>
      </div>
      <div class="wl-items">
        ${items.map(d => `<div class="wl-item" draggable="true" data-type="${d.type}">
          <span class="wl-icon">${d.icon}</span>${d.label}
        </div>`).join("")}
      </div>`;

    // Attach drag events
    section.querySelectorAll(".wl-item").forEach(item => {
      item.addEventListener("dragstart", e => e.dataTransfer.setData("wtype", item.dataset.type));
    });

    wrap.appendChild(section);
  });
}

// ─── BIDIRECTIONAL PARSE (Python → Canvas) ────────────────────────────────
function parseCode() {
  const code = document.getElementById("code-output").value;
  if (!code.trim()) return;
  fetch("/api/parse", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code }),
  })
    .then(r => r.json())
    .then(state => {
      if (state.error) { toast("Parse error — check console"); console.error(state.error); return; }
      applyState(state);
      toast("Canvas updated from code");
    })
    .catch(e => toast("Parse failed: " + e));
}

function applyState(state) {
  // Clear current canvas
  push();
  widgets.length = 0;
  canvasEl.querySelectorAll(".widget-box").forEach(el => el.remove());
  selectedIds.clear();

  // Re-create widgets from first page (multi-page support via future page tabs)
  const pages = state.pages || [];
  const allWidgets = pages.flatMap(p => p.widgets || []);

  allWidgets.forEach(w => {
    // Ensure required fields
    w.id      = w.id      || uid();
    w.x       = w.x       ?? 0;
    w.y       = w.y       ?? 0;
    w.w       = w.w       ?? 480;
    w.h       = w.h       ?? 320;
    w.zIndex  = w.zIndex  ?? 1;
    w.title   = w.title   ?? "";
    w.colors  = w.colors  || null;
    w.animate = w.animate ?? true;
    w.tooltip = w.tooltip ?? true;
    widgets.push(w);
    const el = createWidgetEl(w);
    canvasEl.appendChild(el);
    renderPreview(w);
  });

  renderProps();
  syncCode();
}

// ─── PROJECTS ─────────────────────────────────────────────────────────────
let _currentProjectId = null;

function openSaveDialog() {
  const name = document.getElementById("pd-project-name");
  name.value = name.value || "My Dashboard";
  openProjectsDrawer();
  name.focus();
}

function openProjectsDrawer() {
  document.getElementById("projects-drawer").classList.add("open");
  document.getElementById("projects-drawer-overlay").style.display = "block";
  loadProjectsList();
}

function closeProjectsDrawer() {
  document.getElementById("projects-drawer").classList.remove("open");
  document.getElementById("projects-drawer-overlay").style.display = "none";
}

function saveProject() {
  const name = document.getElementById("pd-project-name").value.trim() || "Untitled";
  const state = getCanvasState();
  const id    = _currentProjectId || String(Date.now());

  fetch("/api/projects", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, name, state }),
  })
    .then(r => r.json())
    .then(result => {
      _currentProjectId = result.id;
      toast(`Saved: ${name}`);
      loadProjectsList();
    })
    .catch(e => toast("Save failed: " + e));
}

function loadProjectsList() {
  fetch("/api/projects")
    .then(r => r.json())
    .then(list => renderProjectsList(list))
    .catch(() => {});
}

function renderProjectsList(list) {
  const el = document.getElementById("pd-list");
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="pd-empty">No saved projects yet.<br>Enter a name above and click Save.</div>';
    return;
  }
  el.innerHTML = list.map(p => {
    const dt = new Date(p.updated_at * 1000).toLocaleString();
    return `
      <div class="pd-item">
        <div style="flex:1">
          <div class="pd-item-name">${p.name}</div>
          <div class="pd-item-date">${dt}</div>
        </div>
        <button class="pd-item-load" onclick="loadProject('${p.id}','${p.name.replace(/'/g,"\\'")}')">Load</button>
        <button class="pd-item-del"  onclick="deleteProject('${p.id}')">&#10005;</button>
      </div>
    `;
  }).join("");
}

function loadProject(id, name) {
  fetch("/api/projects/" + id)
    .then(r => r.json())
    .then(p => {
      if (p.error) { toast("Load failed"); return; }
      _currentProjectId = id;
      document.getElementById("pd-project-name").value = name;
      applyState(p.state);
      closeProjectsDrawer();
      toast(`Loaded: ${name}`);
    })
    .catch(e => toast("Load failed: " + e));
}

function deleteProject(id) {
  if (!confirm("Delete this project?")) return;
  fetch("/api/projects/" + id, { method: "DELETE" })
    .then(r => r.json())
    .then(() => loadProjectsList())
    .catch(() => {});
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

  if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key === "z") { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey||e.metaKey) && (e.key === "y" || (e.shiftKey && e.key === "z"))) { e.preventDefault(); redo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key === "d") { e.preventDefault(); duplicateSelected(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key === "a") {
    e.preventDefault();
    widgets.forEach(w => selectedIds.add(w.id));
    updateSelectionUI(); renderProps(); return;
  }

  // Arrow key nudge
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key) && selectedIds.size) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    push();
    selectedIds.forEach(id => {
      const w = getW(id); if (!w) return;
      if (e.key === "ArrowLeft")  { w.x -= step; }
      if (e.key === "ArrowRight") { w.x += step; }
      if (e.key === "ArrowUp")    { w.y -= step; }
      if (e.key === "ArrowDown")  { w.y += step; }
      const el = document.getElementById("w-" + id);
      if (el) { el.style.left = w.x + "px"; el.style.top = w.y + "px"; }
    });
    syncCode(); return;
  }

  if ((e.key === "Delete" || e.key === "Backspace") && selectedIds.size) {
    e.preventDefault();
    deleteSelected();
  }
});

// ─── TOAST ────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg, ms = 2200) {
  const el = document.getElementById("cc-toast");
  el.textContent = msg;
  el.classList.add("visible");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("visible"), ms);
}
